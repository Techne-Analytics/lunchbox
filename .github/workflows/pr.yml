name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lunchbox_test
          POSTGRES_USER: lunchbox
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Security audit
        run: pip-audit --strict --desc on

      - name: Test with coverage
        env:
          SECRET_KEY: test-ci-secret
          TEST_DATABASE_URL: postgresql://lunchbox:test@localhost:5432/lunchbox_test
        run: |
          pytest -v --cov=lunchbox --cov-report=term-missing --cov-fail-under=60

      - name: Check Alembic migrations
        env:
          DATABASE_URL: postgresql://lunchbox:test@localhost:5432/lunchbox_test
        run: |
          if ls alembic/versions/*.py 1>/dev/null 2>&1; then
            alembic upgrade head
            alembic check
          else
            echo "No migration files yet — skipping alembic check"
          fi

      - name: Verify Docker build
        run: docker build -t lunchbox:test .

      # pr-toolkit review is required before merge — run via Claude Code on each PR.
